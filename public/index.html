<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webhook Gateway Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Webhook Gateway Admin</h1>
      <p class="subtext">
        Add your app names and webhook URLs for Instagram, Facebook, and WhatsApp.
      </p>

      <section class="card">
        <h2 id="form-title">Add Client App</h2>
        <form id="client-form">
          <label>
            App Name
            <input type="text" id="client-name" required placeholder="Cinergo / Mamma Mia / ST90" />
          </label>

          <div id="service-sections"></div>

          <p id="form-message" class="form-message" aria-live="polite"></p>

          <div class="form-actions">
            <button type="submit" id="submit-btn">Add Client</button>
            <button type="button" id="cancel-edit-btn" class="secondary-btn hidden">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Configured Clients</h2>
        <div id="clients-list" class="clients-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
